<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lotchecker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Lotchecker</h1>

  <div class="section">
    <h2>📸 Live Camera</h2>
    <video id="camera" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <button id="captureBtn">Capture</button>

    <h3>OCR Result (Live)</h3>
    <textarea id="liveOutput"></textarea>
  </div>

  <div class="section">
    <h2>📁 Foto 1</h2>
    <input type="file" id="file1" accept="image/*" capture="environment">
    <textarea id="output1"></textarea>
  </div>

  <div class="section">
    <h2>📁 Foto 2</h2>
    <input type="file" id="file2" accept="image/*" capture="environment">
    <textarea id="output2"></textarea>
  </div>

  <div class="section">
    <h2>🔍 Vergelijking</h2>
    <button id="compareBtn">Vergelijk</button>
    <div id="compareResult"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
