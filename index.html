<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Lotchecker – Crop Upload</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Foto upload + crop</h1>

<input type="file" id="fileInput" accept="image/*">

<div id="imageContainer">
  <img id="uploadedImage">
  <div id="cropBox"></div>
</div>

<button id="cropBtn">OCR op geselecteerd gebied</button>

<textarea id="ocrOutput" placeholder="OCR resultaat"></textarea>

<script src="app.js"></script>
</body>
</html>
